name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          debug: false
          script: |
            set -e
            if [ ! -d "${{ secrets.VPS_PATH }}" ]; then
              echo "[deploy] Directory does not exist: ${{ secrets.VPS_PATH }}"
              echo "[deploy] Current directory: $(pwd)"
              echo "[deploy] Listing /root (if accessible):"
              ls -la /root || true
              exit 1
            fi

            cd "${{ secrets.VPS_PATH }}"
            echo "[deploy] cd success: $(pwd)"

            git fetch --all
            git reset --hard origin/main

            # Clean previous stack to avoid docker network label conflicts
            docker compose down --remove-orphans || true
            docker network rm ipms_mob_api || true

            docker compose up -d --build
            docker compose ps

            echo "Deployment completed!"