server {
  listen 80;
  server_name ipms-mob-api.pgmanagement.site;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name ipms-mob-api.pgmanagement.site;

  ssl_certificate /etc/letsencrypt/live/ipms-mob-api.pgmanagement.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ipms-mob-api.pgmanagement.site/privkey.pem;

  location / {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
