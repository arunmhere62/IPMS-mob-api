name: Deploy to VPS

on:
  push:
    branches: [ "main", "development" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          debug: false
          script: |
            set -e

            # Set deployment path and docker-compose file based on branch
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              DEPLOY_PATH="/root/IPMS-mob-api"
              COMPOSE_FILE="docker-compose.yml"
              NETWORK_NAME="ipms_mob_api"
            elif [ "${{ github.ref }}" = "refs/heads/development" ]; then
              DEPLOY_PATH="/root/IPMS-mob-api-dev"
              COMPOSE_FILE="docker-compose.dev.yml"
              NETWORK_NAME="ipms_mob_api_dev"
            else
              echo "Unsupported branch: ${{ github.ref }}"
              exit 1
            fi

            echo "[deploy] Branch: ${{ github.ref }}"
            echo "[deploy] Path: $DEPLOY_PATH"
            echo "[deploy] Compose file: $COMPOSE_FILE"

            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "[deploy] Directory does not exist: $DEPLOY_PATH"
              echo "[deploy] Current directory: $(pwd)"
              echo "[deploy] Listing /root (if accessible):"
              ls -la /root || true
              exit 1
            fi

            cd "$DEPLOY_PATH"
            echo "[deploy] cd success: $(pwd)"

            git fetch --all
            git reset --hard origin/${{ github.ref_name }}

            # Clean previous stack to avoid docker network label conflicts
            docker compose -f $COMPOSE_FILE down --remove-orphans || true
            docker network rm $NETWORK_NAME || true

            docker compose -f $COMPOSE_FILE up -d --build
            docker compose -f $COMPOSE_FILE ps

            echo "Deployment completed!"