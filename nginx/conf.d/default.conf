upstream backend_upstream {
  server backend:3000;
  keepalive 64;
}

# HTTP → HTTPS redirect
server {
  listen 80;
  listen [::]:80;
  server_name ipms-mob-api.pgmanagement.site;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS server
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name ipms-mob-api.pgmanagement.site;

  ssl_certificate /etc/letsencrypt/live/ipms-mob-api.pgmanagement.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ipms-mob-api.pgmanagement.site/privkey.pem;

  client_max_body_size 50M;

  location / {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
