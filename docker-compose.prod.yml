services:
  ipgm-mobapi-prod:
    build: .
    image: ${APP_IMAGE:-ipgm-mobapi-prod}:${APP_TAG:-latest}
    container_name: ipgm-mobapi-prod
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      API_VERSION: v1
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY_ID: ${FIREBASE_PRIVATE_KEY_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_CLIENT_ID: ${FIREBASE_CLIENT_ID}
      EMAIL_ENABLED: ${EMAIL_ENABLED}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_SECURE: ${EMAIL_SECURE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      CCAVENUE_MERCHANT_ID: ${CCAVENUE_MERCHANT_ID}
      CCAVENUE_ACCESS_CODE: ${CCAVENUE_ACCESS_CODE}
      CCAVENUE_WORKING_KEY: ${CCAVENUE_WORKING_KEY}
      CCAVENUE_PAYMENT_URL: ${CCAVENUE_PAYMENT_URL}
      CCAVENUE_REDIRECT_URL: ${CCAVENUE_REDIRECT_URL}
      CCAVENUE_CANCEL_URL: ${CCAVENUE_CANCEL_URL}
      ALLOW_TEST_OTP: ${ALLOW_TEST_OTP}
      FORCE_REAL_SMS_IN_DEV: ${FORCE_REAL_SMS_IN_DEV}
    expose:
      - "3000"

  ipgm-mobapi-prod-nginx:
    image: nginx:1.27-alpine
    container_name: ipgm-mobapi-prod-nginx
    restart: unless-stopped
    depends_on:
      - ipgm-mobapi-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/prod-api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

  ipgm-mobapi-prod-certbot:
    image: certbot/certbot:latest
    container_name: ipgm-mobapi-prod-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: ["sh", "-c"]
    command:
      - |
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done

networks:
  default:
    external: true
    name: ipgm-mobapi-prod-network
